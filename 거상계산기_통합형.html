<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>거상 캐시 장부 계산기</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; background: #f4f6f9; padding: 20px; color: #333; margin: 0; }
        h2 { text-align: center; color: #2c3e50; margin-bottom: 25px; }
        
        /* 좌우 분할 레이아웃 */
        .wrapper { display: flex; gap: 20px; max-width: 1300px; margin: 0 auto; flex-wrap: wrap; }
        .left-panel, .right-panel { background: #fff; padding: 20px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .left-panel { flex: 1; min-width: 320px; max-width: 400px; }
        .right-panel { flex: 2; min-width: 600px; display: flex; flex-direction: column; }
        
        /* 입력 박스 스타일 */
        .box { background: #fafafa; padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #e1e8ed; }
        h3 { margin-top: 0; font-size: 15px; color: #34495e; border-left: 4px solid #3498db; padding-left: 8px; }
        
        .input-group { display: flex; gap: 10px; margin-bottom: 10px; }
        .input-group > div { flex: 1; }
        
        label { display: block; margin: 5px 0; font-size: 12px; font-weight: bold; color: #555; }
        input { width: 100%; padding: 8px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; font-size: 13px; }
        
        button { width: 100%; padding: 10px; background: #3498db; color: white; border: none; border-radius: 4px; font-size: 14px; font-weight: bold; cursor: pointer; margin-top: 5px; transition: 0.2s; }
        button:hover { background: #2980b9; }
        button.delete-btn { background: #e74c3c; padding: 6px; font-size: 12px; margin-top: 0; }
        button.delete-btn:hover { background: #c0392b; }

        /* 우측 테이블 스타일 */
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 13px; }
        th, td { border: 1px solid #ecf0f1; padding: 10px; text-align: center; vertical-align: middle; }
        
        /* 테이블 헤더 (진한 남색 배경 유지) */
        th { background: #34495e; color: white; white-space: nowrap; }
        th.sub-header { background: #2c3e50; } /* 서브 헤더용 약간 더 어두운 남색 */
        
        tbody tr:nth-child(even) { background: #fdfdfd; }
        
        /* 개수 조절 화살표 및 입력창 스타일 */
        .qty-control { display: flex; align-items: center; justify-content: center; gap: 5px; }
        .qty-btn { 
            width: 26px; height: 26px; padding: 0; margin: 0; 
            background: #f1f2f6; border: 1px solid #ced6e0; border-radius: 4px; 
            color: #2f3542; font-size: 12px; cursor: pointer; 
            display: inline-flex; align-items: center; justify-content: center; 
            transition: all 0.2s; 
        }
        .qty-btn:hover { background: #dfe4ea; border-color: #a4b0be; }
        .qty-btn:active { transform: scale(0.95); }
        
        .qty-input { 
            width: 45px; text-align: center; font-weight: bold; font-size: 14px; 
            padding: 4px; border: 1px solid #ccc; border-radius: 4px; 
        }
        /* 넘버 인풋 스핀 버튼 숨기기 */
        .qty-input::-webkit-outer-spin-button,
        .qty-input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        .qty-input[type=number] { -moz-appearance: textfield; }

        /* 데이터 하이라이트 색상 */
        .text-cash { color: #c0392b; font-weight: bold; }
        .text-gold { color: #27ae60; font-weight: bold; }
        .bg-light-gray { background-color: #f8f9fa; } /* 합계 데이터 칸 강조용 */

        /* 총액 하단 바 */
        .total-box { margin-top: auto; padding: 15px; background: #e8f4fd; border: 2px solid #3498db; border-radius: 8px; font-size: 15px; line-height: 1.6; display: flex; justify-content: space-around; flex-wrap: wrap; }
        .total-box span { font-weight: bold; font-size: 18px; }
        .total-box .total-cash span { color: #c0392b; }
        .total-box .total-gold span { color: #27ae60; }
        
        /* 빈 리스트 안내 */
        .empty-msg { text-align: center; color: #95a5a6; padding: 40px 0; font-size: 14px; }
    </style>
</head>
<body>

<h2>💰 거상 캐시 거래 장부</h2>

<div class="wrapper">
    <!-- 좌측: 입력 패널 -->
    <div class="left-panel">
        
        <!-- 1. 필요 캐시 구하기 -->
        <div class="box">
            <h3>1. 게임머니 단가로 추가 (캐시 도매/구매)</h3>
            <div class="input-group">
                <div>
                    <label>아이템명 (선택)</label>
                    <input type="text" id="name1" placeholder="예: 백호의단지">
                </div>
                <div>
                    <label>개수 (기본 1)</label>
                    <input type="number" id="qty1" value="1" min="1">
                </div>
            </div>
            <div class="input-group">
                <div>
                    <label>개당 게임머니 (억)</label>
                    <input type="number" id="gold1" step="0.01" placeholder="예: 4.5">
                </div>
                <div>
                    <label>시세 비율 (만당 억)</label>
                    <input type="number" id="ratio1" step="0.1" placeholder="예: 3.2">
                </div>
            </div>
            <button onclick="addCashItem()">장부에 추가하기</button>
        </div>

        <!-- 2. 적정 게임머니 구하기 -->
        <div class="box">
            <h3>2. 캐시 단가로 추가 (캐시 판매/현질)</h3>
            <div class="input-group">
                <div>
                    <label>아이템명 (선택)</label>
                    <input type="text" id="name2" placeholder="예: 각성석">
                </div>
                <div>
                    <label>개수 (기본 1)</label>
                    <input type="number" id="qty2" value="1" min="1">
                </div>
            </div>
            <div class="input-group">
                <div>
                    <label>개당 캐시 (원)</label>
                    <input type="number" id="cash2" placeholder="예: 15000">
                </div>
                <div>
                    <label>시세 비율 (만당 억)</label>
                    <input type="number" id="ratio2" step="0.1" placeholder="예: 3.2">
                </div>
            </div>
            <button onclick="addGoldItem()">장부에 추가하기</button>
        </div>
    </div>

    <!-- 우측: 장부 테이블 패널 -->
    <div class="right-panel">
        <h3>📋 거래 리스트 상세</h3>
        <div style="flex-grow: 1; overflow-x: auto;">
            <table id="listTable">
                <thead>
                    <tr>
                        <th rowspan="2">구분</th>
                        <th rowspan="2">아이템명</th>
                        <th rowspan="2">비율</th>
                        <th colspan="2" class="sub-header">개당 단가 (1개 기준)</th>
                        <th rowspan="2">개수</th>
                        <th colspan="2" class="sub-header">총 합계 (개수 반영)</th>
                        <th rowspan="2">삭제</th>
                    </tr>
                    <tr>
                        <th class="sub-header">캐시</th>
                        <th class="sub-header">게임머니</th>
                        <th class="sub-header">총 캐시</th>
                        <th class="sub-header">총 게임머니</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <tr><td colspan="9" class="empty-msg">추가된 내역이 없습니다. 좌측에서 아이템을 추가해주세요.</td></tr>
                </tbody>
            </table>
        </div>

        <div class="total-box">
            <div class="total-cash">총 거래 캐시: <span id="totalCashResult">0원</span></div>
            <div class="total-gold">총 거래 게임머니: <span id="totalGoldResult">0냥</span></div>
        </div>
    </div>
</div>

<script>
    let records = [];
    let idCounter = 0;

    // 1. 게임머니 기반 계산 추가
    function addCashItem() {
        const name = document.getElementById('name1').value || '이름 없음';
        let qty = parseInt(document.getElementById('qty1').value) || 1;
        if (qty < 1) qty = 1;
        
        const unitGold = parseFloat(document.getElementById('gold1').value);
        const ratio = parseFloat(document.getElementById('ratio1').value);

        if (!unitGold || !ratio) { alert('게임머니 가격과 시세 비율을 정확히 입력해주세요.'); return; }

        const unitCash = (unitGold / ratio) * 10000;

        records.push({
            id: idCounter++,
            type: '머니 기준',
            name: name,
            ratio: ratio,
            unitCash: unitCash,
            unitGold: unitGold,
            qty: qty,
            cashValue: unitCash * qty,
            goldValue: unitGold * qty
        });

        document.getElementById('name1').value = '';
        document.getElementById('qty1').value = '1';
        document.getElementById('gold1').value = '';
        
        updateTable();
    }

    // 2. 캐시 기반 계산 추가
    function addGoldItem() {
        const name = document.getElementById('name2').value || '이름 없음';
        let qty = parseInt(document.getElementById('qty2').value) || 1;
        if (qty < 1) qty = 1;
        
        const unitCash = parseFloat(document.getElementById('cash2').value);
        const ratio = parseFloat(document.getElementById('ratio2').value);

        if (!unitCash || !ratio) { alert('캐시 가격과 시세 비율을 정확히 입력해주세요.'); return; }

        const unitGold = (unitCash / 10000) * ratio;

        records.push({
            id: idCounter++,
            type: '캐시 기준',
            name: name,
            ratio: ratio,
            unitCash: unitCash,
            unitGold: unitGold,
            qty: qty,
            cashValue: unitCash * qty,
            goldValue: unitGold * qty
        });

        document.getElementById('name2').value = '';
        document.getElementById('qty2').value = '1';
        document.getElementById('cash2').value = '';
        
        updateTable();
    }

    // 개수 화살표 변경 함수
    function changeQty(id, delta) {
        const item = records.find(r => r.id === id);
        if (!item) return;

        item.qty += delta;
        if (item.qty < 1) item.qty = 1;
        recalculateItem(item);
    }

    // 개수 직접 입력 변경 함수
    function updateQtyInput(id, value) {
        const item = records.find(r => r.id === id);
        if (!item) return;

        let newQty = parseInt(value);
        if (isNaN(newQty) || newQty < 1) newQty = 1;

        item.qty = newQty;
        recalculateItem(item);
    }

    // 합계 재계산
    function recalculateItem(item) {
        item.cashValue = item.unitCash * item.qty;
        item.goldValue = item.unitGold * item.qty;
        updateTable();
    }

    // 리스트 삭제
    function removeItem(id) {
        records = records.filter(item => item.id !== id);
        updateTable();
    }

    // 테이블 렌더링
    function updateTable() {
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = '';

        if (records.length === 0) {
            tbody.innerHTML = '<tr><td colspan="9" class="empty-msg">추가된 내역이 없습니다. 좌측에서 아이템을 추가해주세요.</td></tr>';
            document.getElementById('totalCashResult').innerText = '0원';
            document.getElementById('totalGoldResult').innerText = '0냥';
            return;
        }

        let sumCash = 0;
        let sumGoldEok = 0;

        records.forEach(item => {
            sumCash += item.cashValue;
            sumGoldEok += item.goldValue;

            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td><span style="font-size: 11px; background: #eee; padding: 3px 6px; border-radius: 4px;">${item.type}</span></td>
                <td style="font-weight: bold;">${item.name}</td>
                <td style="color: #7f8c8d;">${item.ratio}</td>
                <td class="text-cash">${Math.round(item.unitCash).toLocaleString()}원</td>
                <td class="text-gold">${formatGold(item.unitGold)}</td>
                <td>
                    <div class="qty-control">
                        <button class="qty-btn" onclick="changeQty(${item.id}, -1)">❮</button>
                        <input type="number" class="qty-input" value="${item.qty}" min="1" onchange="updateQtyInput(${item.id}, this.value)">
                        <button class="qty-btn" onclick="changeQty(${item.id}, 1)">❯</button>
                    </div>
                </td>
                <td class="text-cash bg-light-gray">${Math.round(item.cashValue).toLocaleString()}원</td>
                <td class="text-gold bg-light-gray">${formatGold(item.goldValue)}</td>
                <td><button class="delete-btn" onclick="removeItem(${item.id})">삭제</button></td>
            `;
            tbody.appendChild(tr);
        });

        document.getElementById('totalCashResult').innerText = Math.round(sumCash).toLocaleString() + '원';
        document.getElementById('totalGoldResult').innerText = formatGold(sumGoldEok);
    }

    // 억 단위 포맷 함수
    function formatGold(eokValue) {
        const totalMan = Math.round(eokValue * 10000); 
        const eok = Math.floor(totalMan / 10000);
        const man = totalMan % 10000;
        
        let str = '';
        if (eok > 0) str += `${eok}억 `;
        if (man > 0) str += `${man}만 `;
        if (str === '') return '0냥';
        return str + '냥';
    }
</script>

</body>
</html>
